name: Build CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install pylint
      run: pip install pylint

    - name: Run pylint
      run: pylint circuitpython_sevenseg/ --disable=C,W,E0401